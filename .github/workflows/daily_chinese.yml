name: Daily Chinese Lesson

on:
  # 3 texts per day — times are in UTC
  # Currently PDT (UTC-7):  11 AM PDT = 18:00 UTC
  #                          3 PM PDT = 22:00 UTC
  #                          6 PM PDT = 01:00 UTC (next UTC day)
  # In winter PST (UTC-8): shift each by +1 hour
  schedule:
    - cron: '0 18 * * *'    # Slot 0 — 11 AM PDT / 11 AM PST = 19:00 UTC
    - cron: '0 22 * * *'    # Slot 1 —  3 PM PDT /  3 PM PST = 23:00 UTC
    - cron: '0 1 * * *'     # Slot 2 —  6 PM PDT /  6 PM PST = 02:00 UTC

  # Manual trigger for testing — pick which slot to send
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot to send (0=11AM, 1=3PM, 2=6PM)'
        required: true
        default: '0'

jobs:
  slot-0-morning:
    # 11 AM PDT
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '0' || github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send morning lesson (slot 0)
        working-directory: chinese_daily
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMS_EMAIL:          ${{ secrets.SMS_EMAIL }}
          SLOT:               '0'
        run: python send_lesson.py

  slot-1-afternoon:
    # 3 PM PDT
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '1' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send afternoon lesson (slot 1)
        working-directory: chinese_daily
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMS_EMAIL:          ${{ secrets.SMS_EMAIL }}
          SLOT:               '1'
        run: python send_lesson.py

  slot-2-evening:
    # 6 PM PDT
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.slot == '2' || github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send evening lesson (slot 2)
        working-directory: chinese_daily
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMS_EMAIL:          ${{ secrets.SMS_EMAIL }}
          SLOT:               '2'
        run: python send_lesson.py
